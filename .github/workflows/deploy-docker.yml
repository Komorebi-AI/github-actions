name: deploy-docker

on:
  workflow_call:
    inputs:
      runner:
        required: true
        type: string
        description: "Runner label (e.g., self-hosted runner name)"
      ref:
        required: false
        type: string
        default: ''
        description: "Git ref to checkout. Defaults to the triggering ref."
      deploy-command:
        required: false
        type: string
        default: 'make docker'
        description: "Command to build and deploy the application"
      debug-enabled:
        required: false
        type: boolean
        default: false
    secrets:
      ssh-private-key:
        required: false

jobs:
  deploy:
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
      - name: Setup tmate session
        uses: mxschmitt/action-tmate@v3
        if: ${{ inputs.debug-enabled }}
        with:
          detached: true
      - uses: webfactory/ssh-agent@v0.10.0
        env:
          ssh-private-key: ${{ secrets.ssh-private-key }}
        if: ${{ env.ssh-private-key != '' }}
        with:
          ssh-private-key: ${{ secrets.ssh-private-key }}
      - name: Deploy
        run: |
          ${{ inputs.deploy-command }}
