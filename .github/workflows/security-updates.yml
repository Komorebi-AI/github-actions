name: Security Updates

on:
  workflow_call:
    inputs:
      uv-version:
        required: false
        type: string
        default: latest
      branch-name:
        required: false
        type: string
        default: security/dependency-updates
      pr-title:
        required: false
        type: string
        default: "Security: upgrade vulnerable dependencies"
      debug-enabled:
        required: false
        type: boolean
        default: false
    secrets:
      token:
        required: true
      ssh-private-key:
        required: false

jobs:
  fix-transitive-vulns:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.token }}
      - name: Setup tmate session
        uses: mxschmitt/action-tmate@v3
        if: ${{ inputs.debug-enabled }}
        with:
          detached: true
      - uses: webfactory/ssh-agent@v0.10.0
        env:
          ssh-private-key: ${{ secrets.ssh-private-key }}
        if: ${{ env.ssh-private-key != '' }}
        with:
          ssh-private-key: ${{ secrets.ssh-private-key }}
      - uses: astral-sh/setup-uv@v7
        with:
          version: ${{ inputs.uv-version }}

      - name: Fetch open Dependabot alerts
        run: |
          gh api /repos/${{ github.repository }}/dependabot/alerts \
            --jq '[.[] | select(.state == "open" and
                   .dependency.package.ecosystem == "pip") |
                   {
                     name: .dependency.package.name,
                     fixed: .security_vulnerability.first_patched_version.identifier,
                     ghsa: .security_advisory.ghsa_id,
                     cve: .security_advisory.cve_id,
                     summary: .security_advisory.summary,
                     severity: .security_advisory.severity
                   }]' \
            > /tmp/alerts.json

          # Group alerts by package: highest fix version, collect all advisories
          jq '
            group_by(.name) | map({
              name: .[0].name,
              fixed: (map(.fixed | select(. != null)) | sort_by(split(".") | map(tonumber? // 0)) | last),
              advisories: map(
                (if .cve != null then
                  "[" + .cve + "](https://nvd.nist.gov/vuln/detail/" + .cve + ")"
                else
                  "[" + .ghsa + "](https://github.com/advisories/" + .ghsa + ")"
                end) + " (" + .severity + "): " + .summary
              )
            })
          ' /tmp/alerts.json > /tmp/grouped.json

          count=$(jq length /tmp/grouped.json)
          echo "Packages with open alerts: $count"
          if [[ "$count" -eq 0 ]]; then
            echo "No open alerts — nothing to do"
            echo "skip=true" >> "$GITHUB_ENV"
          fi
        env:
          GH_TOKEN: ${{ secrets.token }}

      - name: Extract direct dependencies from pyproject.toml
        if: env.skip != 'true'
        run: |
          python3 -c "
          import tomllib, re, pathlib
          data = tomllib.loads(pathlib.Path('pyproject.toml').read_text()) if pathlib.Path('pyproject.toml').exists() else {}
          deps = set()
          for d in data.get('project', {}).get('dependencies', []):
              deps.add(re.sub(r'[-_.]+', '-', re.split(r'[>=<!\[;@\s]', d)[0].strip()).lower())
          for group in data.get('project', {}).get('optional-dependencies', {}).values():
              for d in group:
                  deps.add(re.sub(r'[-_.]+', '-', re.split(r'[>=<!\[;@\s]', d)[0].strip()).lower())
          for group in data.get('dependency-groups', {}).values():
              for d in group:
                  if isinstance(d, str):
                      deps.add(re.sub(r'[-_.]+', '-', re.split(r'[>=<!\[;@\s]', d)[0].strip()).lower())
          print('\n'.join(sorted(deps)))
          " > /tmp/direct_deps.txt

      - name: Save current versions and attempt upgrades
        if: env.skip != 'true'
        run: |
          # Save original versions before upgrading
          jq -r '.[].name' /tmp/grouped.json | while read pkg; do
            version=$(grep -iA1 "name = \"$pkg\"" uv.lock | grep version | grep -oP '"\K[^"]+' || echo "unknown")
            echo "$pkg=$version"
          done > /tmp/before_versions.txt

          # Run upgrades: pin to fix version when known, upgrade to latest when unknown
          now=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          jq -r '.[] | .name + "\t" + (.fixed // "")' /tmp/grouped.json | while IFS=$'\t' read pkg fixed; do
            if [[ -n "$fixed" ]]; then
              echo "Upgrading $pkg to $fixed (overriding exclude-newer)..."
              uv lock --upgrade-package "$pkg==$fixed" --exclude-newer "$now"
            else
              echo "Upgrading $pkg to latest (fix version unknown)..."
              uv lock --upgrade-package "$pkg"
            fi
          done

      - name: Create or update PR
        if: env.skip != 'true'
        run: |
          if [[ -z "$(git diff uv.lock)" ]]; then
            echo "No lockfile changes — all packages may be constrained"
            exit 0
          fi

          # Build PR body: Direct deps (upgraded / not upgraded), then Transitive (upgraded / not upgraded)
          fixed_direct=""
          unfixed_direct=""
          fixed_transitive=""
          unfixed_transitive=""

          # Helper: normalize package name (PEP 503) and check if direct
          is_direct() {
            local normalized
            normalized=$(echo "$1" | tr '[:upper:]' '[:lower:]' | sed 's/[-_.]\+/-/g')
            grep -qx "$normalized" /tmp/direct_deps.txt 2>/dev/null
          }

          for row in $(jq -r '.[] | @base64' /tmp/grouped.json); do
            _jq() { echo "$row" | base64 --decode | jq -r "$1"; }
            pkg=$(_jq '.name')
            fix_version=$(_jq '.fixed')
            advisories=$(_jq '.advisories | map("• " + .) | join("<br>")')

            if is_direct "$pkg"; then
              label="direct"
            else
              label="transitive"
            fi

            before=$(grep -i "^$pkg=" /tmp/before_versions.txt | head -1 | cut -d= -f2)
            after=$(grep -iA1 "name = \"$pkg\"" uv.lock | grep version | grep -oP '"\K[^"]+' || echo "unknown")

            # fix_version is "null" (string) when no patched version exists
            needs="${fix_version}"
            [[ "$needs" == "null" ]] && needs="unknown"
            was_upgraded=false
            [[ "$after" != "unknown" && "$before" != "$after" ]] && was_upgraded=true

            # Fixed if: version meets the known fix, OR fix is unknown but we upgraded to latest
            is_fixed=false
            if [[ "$after" != "unknown" ]]; then
              if [[ "$fix_version" != "null" ]] && [[ "$(printf '%s\n' "$fix_version" "$after" | sort -V | head -1)" == "$fix_version" ]]; then
                is_fixed=true
              elif [[ "$fix_version" == "null" && "$was_upgraded" == "true" ]]; then
                is_fixed=true
              fi
            fi

            if [[ "$is_fixed" == "true" ]]; then
              row="| $pkg | $before → $after | $needs | $advisories |\n"
              if [[ "$label" == "direct" ]]; then fixed_direct+="$row"; else fixed_transitive+="$row"; fi
              echo "✅ $pkg ($label) $before → $after"
            else
              if [[ "$was_upgraded" == "true" ]]; then
                version="$before → $after"
              else
                version="$before"
              fi
              row="| $pkg | $version | $needs | $advisories |\n"
              if [[ "$label" == "direct" ]]; then unfixed_direct+="$row"; else unfixed_transitive+="$row"; fi
              echo "⚠️  $pkg ($label) stuck at $after — needs $needs"
            fi
          done

          # Helper: render a 4-column table or fallback message
          render_table() {
            local rows="$1"
            local empty_msg="${2:-None.}"
            if [[ -n "$rows" ]]; then
              echo "| Package | Version | Needs | Vulnerabilities |\n|---|---|---|---|\n$rows"
            else
              echo "$empty_msg\n"
            fi
          }

          pr_body="## Direct dependencies\n\n"
          pr_body+="### Upgraded\n\n"
          pr_body+="$(render_table "$fixed_direct" "No packages were upgraded.")\n"
          if [[ -n "$unfixed_direct" ]]; then
            pr_body+="\n### Not upgraded\n\n"
            pr_body+="$(render_table "$unfixed_direct")\n"
          fi
          pr_body+="\n## Transitive dependencies\n\n"
          pr_body+="### Upgraded\n\n"
          pr_body+="$(render_table "$fixed_transitive" "No packages were upgraded.")\n"
          if [[ -n "$unfixed_transitive" ]]; then
            pr_body+="\n### Not upgraded\n\n"
            pr_body+="$(render_table "$unfixed_transitive")\n"
          fi

          # Render the body (interpret \n)
          pr_body=$(echo -e "$pr_body")

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Check if PR already exists
          existing_pr=$(gh pr list --head "${{ inputs.branch-name }}" --state open --json number --jq '.[0].number' || echo "")

          # Create or update the branch from current state (uv.lock already modified)
          git checkout -B "${{ inputs.branch-name }}"
          git add uv.lock
          git commit -m "fix: upgrade vulnerable dependencies"
          git push origin "${{ inputs.branch-name }}" --force

          if [[ -n "$existing_pr" ]]; then
            gh pr edit "$existing_pr" --body "$pr_body"
            echo "Updated PR #$existing_pr"
          else
            gh pr create \
              --title "${{ inputs.pr-title }}" \
              --body "$pr_body"
          fi
        env:
          GH_TOKEN: ${{ secrets.token }}
