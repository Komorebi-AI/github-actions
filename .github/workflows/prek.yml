name: prek

on:
  workflow_call:
    inputs:
      python-version:
        required: false
        type: string
        default: ''
      uv-version:
        required: false
        type: string
        default: latest
      prek-args:
        required: false
        type: string
        default: '--all-files'
      skip-hooks:
        required: false
        type: string
        default: ''
        description: 'Comma-separated hook IDs to skip (passed to prek via the SKIP env var)'
      check-ruff-version:
        required: false
        type: boolean
        default: false
        description: 'Verify the ruff version in uv.lock matches the ruff-pre-commit rev in .pre-commit-config.yaml'
      debug-enabled:
        required: false
        type: boolean
        default: false
    secrets:
      ssh-private-key:
        required: false

jobs:
  prek:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # required to grab the history of the PR for prek
          fetch-depth: 0
      - name: Setup tmate session
        uses: mxschmitt/action-tmate@v3
        if: ${{ inputs.debug-enabled }}
        with:
          detached: true
      - uses: webfactory/ssh-agent@v0.10.0
        env:
          ssh-private-key: ${{ secrets.ssh-private-key }}
        if: ${{ env.ssh-private-key != '' }}
        with:
          ssh-private-key: ${{ secrets.ssh-private-key }}
      # We support a specific Python version as arg or reading it from
      # the .python-version file. If there is not a .python-version file
      # it will pick the first Python version allowed by looking at the
      # `requires-python` field of the `pyproject.toml` file.
      - name: Install uv and Python
        if: ${{ inputs.python-version != '' }}
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ inputs.uv-version }}
          enable-cache: true
          cache-dependency-glob: uv.lock
          python-version: ${{ inputs.python-version }}
      - name: Install uv and Python using .python-version
        if: ${{ inputs.python-version == '' }}
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ inputs.uv-version }}
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Install the project
        run: uv sync --locked --dev --all-extras
      - name: Check ruff versions are in sync
        if: ${{ inputs.check-ruff-version }}
        run: |
          LOCK_VER=$(awk '/^name = "ruff"$/{getline; if ($1 == "version") {gsub(/"/, "", $3); print $3; exit}}' uv.lock)
          CONFIG_VER=$(grep -A2 'ruff-pre-commit' .pre-commit-config.yaml | grep 'rev:' | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          if [ -z "$LOCK_VER" ] || [ -z "$CONFIG_VER" ]; then
            echo "::error::Could not extract ruff version (uv.lock=$LOCK_VER, .pre-commit-config.yaml=$CONFIG_VER)"
            exit 1
          fi
          if [ "$LOCK_VER" != "$CONFIG_VER" ]; then
            echo "::error::Ruff version mismatch: uv.lock=$LOCK_VER, .pre-commit-config.yaml=$CONFIG_VER"
            exit 1
          fi
          echo "Ruff versions in sync: $LOCK_VER"
      - name: Run prek
        uses: j178/prek-action@v2
        with:
          extra-args: ${{ inputs.prek-args }}
        env:
          SKIP: ${{ inputs.skip-hooks }}
