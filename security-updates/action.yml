name: Security Updates
description: >
  Upgrade vulnerable dependencies (direct and transitive) in uv.lock
  by reading Dependabot alerts and running uv lock --upgrade-package
  for each affected package. Opens or updates a single PR with details.
  Authenticates via a GitHub App.

inputs:
  app-id:
    description: GitHub App ID
    required: true
  private-key:
    description: GitHub App private key (PEM)
    required: true
  branch-name:
    description: Branch name for the PR
    required: false
    default: security/dependency-updates
  pr-title:
    description: Title for the PR
    required: false
    default: "security: upgrade vulnerable dependencies"

runs:
  using: composite
  steps:
    - uses: actions/create-github-app-token@v3
      id: app-token
      with:
        app-id: ${{ inputs.app-id }}
        private-key: ${{ inputs.private-key }}
    - uses: astral-sh/setup-uv@v7
    - name: Configure git with app token
      shell: bash
      run: |
        git remote set-url origin "https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/${{ github.repository }}.git"
    - name: Run security updates
      shell: bash
      run: python "${{ github.action_path }}/update.py"
      env:
        GH_TOKEN: ${{ steps.app-token.outputs.token }}
        INPUT_BRANCH_NAME: ${{ inputs.branch-name }}
        INPUT_PR_TITLE: ${{ inputs.pr-title }}
